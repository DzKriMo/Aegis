name: guardrail-quality

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-ml.txt
          pip install scikit-learn joblib redis

      - name: Policy schema validation
        run: python scripts/validate_policies.py --path config/policies.example.yaml

      - name: Guardrail tests
        env:
          AEGIS_LLM_ENABLED: "false"
          AEGIS_DB_ENABLED: "false"
          AEGIS_SEMANTIC_ENABLED: "false"
          POLICY_PATH: "config/policies.example.yaml"
          HF_HUB_OFFLINE: "1"
          TRANSFORMERS_OFFLINE: "1"
          PYTHONIOENCODING: "utf-8"
        run: python -m unittest tests.test_policy_validation tests.test_production_hardening tests.test_guardrail_regression -v

      - name: Benchmark trend report
        run: python scripts/benchmark_trend_report.py --glob "research/benchmark_*.json" --out research/benchmark_trend_report.json

      - name: Upload trend artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-trend-report
          path: research/benchmark_trend_report.json
