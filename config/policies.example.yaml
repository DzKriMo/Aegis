policies:
- id: block_ml_block_intent
  stage: prellm
  match:
    any:
    - detector: ml_block_intent
  action: block
  message: Local classifier flagged high-confidence block intent
  risk: 0.9

- id: warn_ml_warn_intent
  stage: prellm
  match:
    any:
    - detector: ml_warn_intent
  action: warn
  message: Local classifier flagged caution intent
  risk: 0.45
- id: block_goal_hijack
  stage: prellm
  match:
    any:
    - detector: goal_hijack
    - detector: jailbreak
    - semantic:
        category: goal_hijack
        threshold: 0.62
  action: block
  message: Prompt injection / goal hijack detected
  risk: 0.9

- id: block_internal_prompt_extraction
  stage: prellm
  match:
    any:
    - detector: internal_prompt_extraction
    - detector: exfiltration
    - regex: "(initial alignment preamble|policy scaffolding|instruction hierarchy|reasoning trace|hidden (system )?instructions?|system prompt|environment variables?|env vars?)"
  action: block
  message: Internal prompt/config extraction attempt detected
  risk: 0.95

- id: block_high_risk_abuse
  stage: prellm
  match:
    any:
    - detector: high_risk_abuse
    - semantic:
        category: high_risk_abuse
        threshold: 0.58
  action: block
  message: High-risk abuse request detected
  risk: 0.95

- id: warn_prompt_injection_context
  stage: prellm
  match:
    any:
    - detector: prompt_injection
  action: warn
  message: Prompt-injection related content detected (flagged)
  risk: 0.4

- id: warn_suspicious_disclosure
  stage: prellm
  match:
    any:
    - detector: suspicious_disclosure
    - semantic:
        category: suspicious_disclosure
        threshold: 0.60
  action: warn
  message: Potential disclosure-oriented request detected
  risk: 0.45

- id: warn_caution_disclosure
  stage: prellm
  match:
    any:
    - detector: caution_disclosure
  action: warn
  message: "Caution: request asks for policy/restriction disclosure context"
  risk: 0.4

- id: warn_exfiltration_prellm
  stage: prellm
  match:
    any:
    - detector: exfiltration
  action: warn
  message: Potential exfiltration intent detected
  risk: 0.5

- id: redact_pii_prellm
  stage: prellm
  match:
    any:
    - detector: pii
  action: redact
  redaction: '[REDACTED_PII_INPUT]'
  message: Input contains potential PII and will be redacted
  risk: 0.35

- id: redact_pii
  stage: postllm
  match:
    any:
    - detector: pii
  action: block
  message: Output contains PII and is blocked
  risk: 0.9

- id: redact_pii_tool_pre
  stage: tool_pre
  match:
    any:
    - detector: pii
  action: redact
  redaction: '[REDACTED_TOOL_INPUT]'
  risk: 0.4

- id: redact_pii_tool_post
  stage: tool_post
  match:
    any:
    - detector: pii
  action: redact
  redaction: '[REDACTED_TOOL_OUTPUT]'
  risk: 0.4

- id: block_secrets
  stage: postllm
  match:
    any:
    - detector: secrets
    - detector: exfiltration
  action: block
  message: Secrets or exfiltration detected
  risk: 0.9

- id: warn_policy_violation
  stage: prellm
  match:
    any:
    - detector: policy_violation
  action: warn
  message: Possible policy violation
  risk: 0.5

- id: approval_for_confidential
  stage: postllm
  match:
    any:
    - label: CONFIDENTIAL
  action: approve
  message: CONFIDENTIAL output requires approval
  risk: 0.8

- id: block_tool_shell_prod
  stage: tool_pre
  match:
    any:
    - regex: shell
    - environment: prod
  action: block
  message: Shell tool blocked by policy
  risk: 0.9

- id: block_tool_secret_result
  stage: tool_post
  match:
    any:
    - detector: secrets
  action: block
  message: Tool result contains secrets
  risk: 0.9

- id: approve_shell_tool
  stage: tool_pre
  match:
    any:
    - regex: shell
  action: approve
  message: Shell tool requires approval
  risk: 0.6

